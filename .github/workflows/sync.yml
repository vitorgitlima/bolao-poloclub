name: Auto Sync Resultados

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: # permite disparo manual pelo GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync resultados ESPN
        run: |
          curl -sf -X GET "${{ secrets.VERCEL_URL }}/api/cron/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
